on:
  workflow_call:
    inputs:
      gosec_args:
        type: string
        default: "-severity high -exclude-dir examples -exclude=G115 ./..."
        description: "gosec tool command line arguments"
      semgrep_args:
        type: string
        default: "scan --config auto --error"
        description: "Semgrep args"
      unit_test_args:
        type: string
        default: |
          -race -cover -skip="^(TestIntegration|TestE2E).*" ./... -args -test.gocoverdir=./
        description: "Golang unit test args (go test ARGS)"
      unit_test_runs-on:
        type: string
        default: ubuntu-latest
        description: "GHA runner for the Unit Test job (ubuntu-latest, ubuntu-latest-4c, ubuntu-latest-8c)"
      integration_test_enabled:
        type: boolean
        default: false
        description: "Golang integration test command to run"
      integration_test_args:
        type: string
        default: |
          -race -run="^TestIntegration.*" ./...
        description: "Golang integration test args (go test ARGS)"
      integration_test_runs-on:
        type: string
        default: ubuntu-latest
        description: "GHA runner for the Integration Test job (ubuntu-latest, ubuntu-latest-4c, ubuntu-latest-8c)"
      runs-on:
        type: string
        default: ubuntu-latest
        description: "GHA runner for the job (ubuntu-latest, ubuntu-latest-4c, ubuntu-latest-8c)"
      timeout-minutes:
        type: number
        default: 10
        description: "Job timeout in minutes"
      go_version_file:
        type: string
        default: 'go.mod'
        description: "Go version file to use"
      sonarcloud_run:
        type: boolean
        default: false
        description: "If true, run a SonarCloud scan after unit tests complete"
      sonarcloud_project_key:
        type: string
        default: ""
        description: "SonarCloud project key"
      sonarcloud_org:
        type: string
        default: "elastiflow"
        description: "SonarCloud organization"
    secrets:
      go_dependency_fetcher_token:
        required: false
        description: "GitHub token with read access to the Golang dependency repositories"
      git_ssh_key:
        required: false
        description: "Git ssh key with access to ElastiFlow repositories"
      sonarcloud_token:
        required: false
        description: "SonarCloud token (required if sonarcloud_run is true)"

jobs:
  go-mod-tidy:
    name: 'go-mod-tidy'
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Run Tidy
        run: |
          go list -m -f '{{.Dir}}' | while read -r svc; do
            cd "${svc}";
            echo "In $(pwd)";
            go mod tidy;
            cd -;
          done
          git diff --exit-code
  goimports:
    name: 'goimports'
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Run goimports
        env:
          GOTOOLCHAIN: auto
        # v0.43.0
        run: |
          go install golang.org/x/tools/cmd/goimports@24a8e95
          goimports -l -w ./
          git diff --exit-code
  staticcheck:
    name: 'staticcheck'
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Run Staticcheck
        env:
          GOTOOLCHAIN: auto
        # v0.7.0
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@ff63afa
          staticcheck $(go list -m -f '{{.Dir}}' | sed 's|$|/... |')
  gosec:
    name: 'gosec'
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Security Scan
        uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0
        with:
          args: ${{ inputs.gosec_args }}
  semgrep:
    name: 'semgrep scan'
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: semgrep scan
        env:
          ARGS: ${{ inputs.semgrep_args }}
        run: "semgrep ${ARGS}"
  unit_test:
    name: 'unit test'
    runs-on: ${{ inputs.unit_test_runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Run tests
        env:
          ARGS: ${{ inputs.unit_test_args }}
        run: "go test ${ARGS}"
      - name: Write coverage threshold config
        if: always()
        uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42
        with:
          path: .testcoverage.yaml
          write-mode: preserve
          contents: |
            profile: coverage.out
            threshold:
              file: 70
              package: 75
              total: 80
      - name: Enforce coverage threshold
        if: always()
        env:
           GOTOOLCHAIN: auto
        # v2.18.4
        run: |
          go install github.com/vladopajic/go-test-coverage/v2@f190f66
          go tool covdata textfmt -i=./ -o=coverage.out
          go-test-coverage --config=.testcoverage.yaml
      - name: Report coverage
        if: always()
        run: |
          echo "Coverage:" >> ${GITHUB_STEP_SUMMARY}
          echo '```' >> ${GITHUB_STEP_SUMMARY}
          go tool covdata percent -i=./ >> ${GITHUB_STEP_SUMMARY}
          echo '```' >> ${GITHUB_STEP_SUMMARY}

          echo >> ${GITHUB_STEP_SUMMARY}
          echo "Coverage thresholds:" >> ${GITHUB_STEP_SUMMARY}
          echo '```' >> ${GITHUB_STEP_SUMMARY}
          go-test-coverage --config=.testcoverage.yaml >> ${GITHUB_STEP_SUMMARY}
          echo '```' >> ${GITHUB_STEP_SUMMARY}
  integration_test:
    name: 'integration test'
    if: ${{ inputs.integration_test_enabled }}
    runs-on: ${{ inputs.integration_test_runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go_version_file }}
      - name: Run tests
        env:
          ARGS: ${{ inputs.unit_test_args }}
        run: "go test ${ARGS}"
