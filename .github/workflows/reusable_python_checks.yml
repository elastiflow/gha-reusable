on:
  workflow_call:
    inputs:
      unit_test_args:
        type: string
        default: "--cov=. --cov-report=xml:coverage.xml"
        description: "Command to run your unit tests"
      runs-on:
        type: string
        default: ubuntu-latest
        description: "Runner for linting jobs (e.g., ubuntu-latest)"
      unit_test_runs-on:
        type: string
        default: ubuntu-latest
        description: "Runner for the unit test job"
      timeout-minutes:
        type: number
        default: 10
        description: "Job timeout in minutes"
      sonarcloud_run:
        type: boolean
        default: false
        description: "If true, run a SonarCloud scan after unit tests complete"
      sonarcloud_project_key:
        type: string
        default: ""
        description: "SonarCloud project key"
      sonarcloud_org:
        type: string
        default: "elastiflow"
        description: "SonarCloud organization"
    secrets:
      sonarcloud_token:
        required: false
        description: "SonarCloud token (required if sonarcloud_run is true)"

jobs:
  ruff_lint:
    name: "ruff lint"
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: "pyproject.toml"
      - name: Install the project
        run: uv sync --dev
      - name: Check lockfile
        run: uv lock --check
      - name: Run Ruff Linting
        run: uv run ruff check .
      - name: Run Ruff formatting
        run: uv run ruff format --check
  unit_test:
    name: "unit test"
    runs-on: ${{ inputs.unit_test_runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version-file: "pyproject.toml"
      - name: Install the project dependencies
        run: uv sync --dev
      - name: Run unit tests
        env:
          UNIT_TEST_ARGS: ${{ inputs.unit_test_args }}
        run: uv run pytest ${UNIT_TEST_ARGS}
      - name: SonarCloud Scan
        if: ${{ inputs.sonarcloud_run }}
        # nosemgrep: detected-sonarqube-docs-api-key, false positive
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonarcloud_project_key }}
            -Dsonar.organization=${{ inputs.sonarcloud_org }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.sonarcloud_token }}
