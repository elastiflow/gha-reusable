name: CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  pr_checks:
    name: PR Checks
    if: >-
      ${{
        github.event_name == 'pull_request'
        && !(github.event_name == 'pull_request' && github.event.pull_request.user.login == 'github-actions[bot]' && startsWith(github.event.pull_request.title, '[release '))
      }}
    uses: ./.github/workflows/reusable_pr_checks.yml

  python_checks:
    name: Python checks
    uses: ./.github/workflows/reusable_python_checks.yml
